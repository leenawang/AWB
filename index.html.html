// 红绿灯计算：基于截止日距离
function trafficLight(deadlineMonth, currentMonth, status) {
  if(!deadlineMonth) return 'none';
  if(status==='DONE'||status==='DELIVERED'||status==='SKIP'||status==='O') return 'green';
  const gap = deadlineMonth - currentMonth;
  if(gap < 0) return 'black'; // 严重逾期
  if(gap === 0) return 'red'; // 本月到期
  if(gap === 1) return 'yellow'; // 下月到期

function migrate(d){
  // V9 → V10 迁移
  if(d.st&&!d.years){d.years={[CY]:{st:d.st,py:d.py}};delete d.st;delete d.py;}
  if(!d.years)d.years={[CY]:mkYr(d.clients||DC)};
  if(!d.personal)d.personal=[];
  if(!d.cfg)d.cfg={theme:"dark",accent:"香槟金"};
  d.clients.forEach(c=>{
    if(c.wx===undefined)c.wx="";if(c.em===undefined)c.em="";if(c.ph===undefined)c.ph="";
    if(c.canton===undefined)c.canton="GE"; // V10: 默认日内瓦
  });
  (d.projects||[]).forEach(p=>{if(!p.links)p.links=[];if(!p.acts)p.acts=[];p.steps?.forEach(s=>{if(s.dl===undefined)s.dl="";if(s.notes===undefined)s.notes="";});});
  if(!d._calImported2){
    const calItems=init().personal;
    const existIds=new Set(d.personal.map(p=>p.id));
    calItems.forEach(it=>{if(!existIds.has(it.id))d.personal.push(it);});
    d._calImported2=true;
  }
  // 尝试从 V9 localStorage 迁移
  if(!d._v10migrated){
    try{
      const v9=localStorage.getItem("awb-v9");
      if(v9){const v9d=JSON.parse(v9);
        if(v9d.clients&&v9d.years){
          d.clients=v9d.clients;d.years=v9d.years;d.projects=v9d.projects||[];
          d.personal=v9d.personal||[];d.prospects=v9d.prospects||[];d.logs=v9d.logs||[];
          d.nid=v9d.nid||100;d.cfg={...d.cfg,...v9d.cfg};
          d.clients.forEach(c=>{if(c.canton===undefined)c.canton="GE";});
        }
      }
    }catch(e){}
    d._v10migrated=true;
  }
  return d;
}

function mkICS(events){
  const pad=d=>d.toISOString().replace(/[-:]/g,"").replace(/\.\d{3}/,"");
  let ics="BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//AWB Fiduciaire//V10//CN\nCALSCALE:GREGORIAN\nMETHOD:PUBLISH\n";
  events.forEach(ev=>{
    const dt=new Date(ev.date+"T09:00:00");const dtE=new Date(ev.date+"T10:00:00");
    ics+=`BEGIN:VEVENT\nDTSTART:${pad(dt)}\nDTEND:${pad(dtE)}\nSUMMARY:${ev.title}\n`;
    if(ev.desc)ics+=`DESCRIPTION:${ev.desc.replace(/\n/g,"\\n")}\n`;
    ics+="BEGIN:VALARM\nTRIGGER:-P1D\nACTION:DISPLAY\nDESCRIPTION:Reminder\nEND:VALARM\n";
    ics+="END:VEVENT\n";
  });
  return ics+"END:VCALENDAR";
}

function parseICS(text){const events=[];let cur=null;text.split(/\r?\n/).forEach(line=>{if(line==="BEGIN:VEVENT")cur={};else if(line==="END:VEVENT"&&cur){events.push(cur);cur=null;}else if(cur){const m=line.match(/^(SUMMARY|DTSTART|DTSTART;[^:]*|DESCRIPTION|LOCATION):(.+)/);if(m){const k=m[1].startsWith("DTSTART")?"DTSTART":m[1];let v=m[2].replace(/\\n/g,"\n").replace(/\\,/g,",");if(k==="DTSTART")v=v.replace(/^(\d{4})(\d{2})(\d{2}).*$/,"$1-$2-$3");cur[k]=v;}}});return events;}

  <button onClick={()=>addPersn(frm)} className="bb">创建</button>
</div></Dlg>

<Dlg open={mod==="addProsp"} close={()=>setMod(null)} title="潜在客户"><div style={{display:"flex",flexDirection:"column",gap:12}}><div><label className="t2" style={{marginBottom:4,display:"block"}}>名称</label><input value={frm.name||""} onChange={e=>setFrm({...frm,name:e.target.value})} className="ip"/></div><div><label className="t2" style={{marginBottom:4,display:"block"}}>来源</label><input value={frm.src||""} onChange={e=>setFrm({...frm,src:e.target.value})} className="ip"/></div><button onClick={()=>addProsp(frm)} className="bb">添加</button></div></Dlg>

<Dlg open={mod?.t==="email"} close={()=>setMod(null)} title="邮件">{mod?.t==="email"&&(()=>{const c=D.clients.find(x=>x.id===mod.cid);if(!c)return null;const e=mkMail(c.ct,c.n,mod.tp,mod.lg);const ml=c.em?`mailto:${c.em}?subject=${encodeURIComponent(e.s)}&body=${encodeURIComponent(e.b)}`:null;return<div style={{display:"flex",flexDirection:"column",gap:10}}>
  {!c.em&&<div style={{padding:10,borderRadius:6,border:"1px solid var(--wn)",color:"var(--wn)",fontSize:13}}>未填写邮箱</div>}
  <div><div className="t2" style={{marginBottom:4}}>主题</div><div className="ip" style={{fontWeight:500}}>{e.s}</div></div>
  <div><div className="t2" style={{marginBottom:4}}>正文</div><div className="ip" style={{whiteSpace:"pre-wrap",lineHeight:1.7}}>{e.b}</div></div>
  <div style={{display:"flex",gap:6}}>
    {ml?<a href={ml} className="bb" style={{textAlign:"center",textDecoration:"none",display:"block"}}>发送</a>:<button onClick={()=>{navigator.clipboard?.writeText(e.s+"\n\n"+e.b);setCped(true);setTimeout(()=>setCped(false),2000);}} className="bb">{cped?"已复制":"复制"}</button>}
    <button onClick={()=>setMod({...mod,lg:mod.lg==="zh"?"fr":"zh"})} className="tg" style={{minWidth:44}}>{mod.lg==="zh"?"FR":"CN"}</button>
  </div></div>;})()}</Dlg>

<Dlg open={mod==="more"} close={()=>setMod(null)} title="更多"><div style={{display:"flex",flexDirection:"column",gap:8}}>
  {[{id:"crm",l:"客户关系",d:"联系计划 · 潜客管道"},{id:"email",l:"邮件助手",d:"催款 · 催材料"}].map(v=><button key={v.id} onClick={()=>{setVw(v.id);setMod(null);}} style={{padding:16,borderRadius:6,background:"var(--bg0)",border:"1px solid var(--bd2)",cursor:"pointer",textAlign:"left"}}><div style={{fontSize:15,fontWeight:500,color:"var(--tx)"}}>{v.l}</div><div className="t2" style={{marginTop:2}}>{v.d}</div></button>)}
  <div style={{borderTop:"1px solid var(--bd2)",paddingTop:10,display:"flex",gap:6}}>
    <button onClick={()=>{sv(ensureYr({...D},yr-1));setYr(yr-1);setMod(null);}} style={{flex:1,padding:10,borderRadius:6,border:"1px solid var(--bd)",background:"transparent",cursor:"pointer",color:"var(--tx)",fontSize:13}}>‹ {yr-1}</button>
    <div style={{flex:1,padding:10,textAlign:"center",fontSize:15,fontWeight:700,color:"var(--ac)"}}>{yr}</div>
    <button onClick={()=>{if(yr<CY+1){sv(ensureYr({...D},yr+1));setYr(yr+1);}setMod(null);}} style={{flex:1,padding:10,borderRadius:6,border:"1px solid var(--bd)",background:"transparent",cursor:"pointer",color:"var(--tx)",fontSize:13}}>{yr+1} ›</button>
  </div>
  <button onClick={()=>{setFrm({});setMod("addCli");}} className="bb">添加客户</button>
  <button onClick={()=>setMod("cfg")} style={{padding:12,borderRadius:6,border:"1px solid var(--bd)",background:"transparent",cursor:"pointer",color:"var(--tx)",fontSize:13}}>设置</button>
</div></Dlg>

{/* 设置 */}
<Dlg open={mod==="cfg"} close={()=>setMod(null)} title="设置"><div style={{display:"flex",flexDirection:"column",gap:16}}>
  <div><div style={{fontSize:11,textTransform:"uppercase",letterSpacing:".1em",color:"var(--tx3)",marginBottom:8,fontWeight:600}}>主题</div>
    <div style={{display:"flex",gap:8}}>{[["dark","深色","#0c0c0e","#f2f0ec"],["light","浅色","#f5f4f0","#1a1a18"]].map(([t,l,bg,fg])=><button key={t} onClick={()=>setCfg("theme",t)} style={{flex:1,padding:14,borderRadius:6,border:`1px solid ${D.cfg?.theme===t?"var(--ac)":"var(--bd)"}`,background:bg,color:fg,cursor:"pointer",fontWeight:500,fontSize:14}}>{l}</button>)}</div>
  </div>
  <div><div style={{fontSize:11,textTransform:"uppercase",letterSpacing:".1em",color:"var(--tx3)",marginBottom:8,fontWeight:600}}>色调</div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{Object.entries(PAL).map(([n,c])=><button key={n} onClick={()=>setCfg("accent",n)} style={{width:40,height:40,borderRadius:6,background:c,border:`2px solid ${D.cfg?.accent===n?"#fff":"transparent"}`,cursor:"pointer",fontSize:0,opacity:D.cfg?.accent===n?1:.5,transition:".2s"}} title={n}/>)}</div>
  </div>
  <div style={{borderTop:"1px solid var(--bd2)",paddingTop:12}}>
    <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:".1em",color:"var(--tx3)",marginBottom:8,fontWeight:600}}>云同步（双向）</div>
    <input value={D.cfg?.syncUrl||""} onChange={e=>setCfg("syncUrl",e.target.value)} placeholder="Apps Script URL..." className="ip" style={{marginBottom:10}}/>
    <div style={{display:"flex",gap:8,marginBottom:8}}>
      <button disabled={syncing||!D.cfg?.syncUrl} onClick={cloudPush} className="bb" style={{opacity:D.cfg?.syncUrl?1:.4}}>{syncing==="push"?"同步中...":"双向同步"}</button>
      <button disabled={syncing||!D.cfg?.syncUrl} onClick={cloudPull} style={{flex:1,padding:12,borderRadius:6,border:"1px solid var(--bd)",background:"transparent",color:"var(--tx)",fontSize:13,cursor:D.cfg?.syncUrl?"pointer":"not-allowed",opacity:D.cfg?.syncUrl?1:.4}}>{syncing==="pull"?"下载中...":"拉取"}</button>
    </div>
    {syncMsg&&<p style={{fontSize:12,color:"var(--tx2)"}}>{syncMsg}</p>}
    {D.cfg?.lastPush&&<p className="t2" style={{marginTop:4}}>上次: {new Date(D.cfg.lastPush).toLocaleString("zh-CN")}</p>}
  </div>
  <div style={{borderTop:"1px solid var(--bd2)",paddingTop:12}}>
    <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:".1em",color:"var(--tx3)",marginBottom:8,fontWeight:600}}>日历 & 数据</div>
    <div style={{display:"flex",gap:8,marginBottom:8}}>
      <button onClick={()=>{const evs=[];D.clients.forEach(c=>{TK.forEach(t=>{const s=(D.years[CY]?.st||{})[`${c.id}-${t.id}`]||"";if(t.dl&&t.dl<=12&&s!=="O"&&s!=="P"){const m2=String(t.dl).padStart(2,"0");evs.push({date:`${CY}-${m2}-28`,title:`AWB: ${c.ct} - ${t.s}`,desc:c.n});}});});D.projects.filter(p=>p.dl&&p.status!=="O").forEach(p=>evs.push({date:p.dl,title:p.name,desc:""}));D.personal.filter(p=>p.dl&&p.status!=="O").forEach(p=>evs.push({date:p.dl,title:p.name,desc:p.cat}));if(evs.length)dlICS(evs,`awb-${TD}.ics`);else alert("暂无");}} style={{flex:1,padding:10,borderRadius:6,border:"1px solid var(--bd)",background:"transparent",color:"var(--tx)",fontSize:12,cursor:"pointer"}}>导出日历</button>
      <button onClick={()=>{const blob=new Blob([JSON.stringify(D,null,2)],{type:"application/json"});const u=URL.createObjectURL(blob);const a=document.createElement("a");a.href=u;a.download=`AWB_V10_${TD}.json`;a.click();URL.revokeObjectURL(u);}} style={{flex:1,padding:10,borderRadius:6,border:"1px solid var(--bd)",background:"transparent",color:"var(--tx)",fontSize:12,cursor:"pointer"}}>导出数据</button>
    </div>
    <label style={{display:"block",padding:10,borderRadius:6,border:"1px solid var(--bd)",background:"transparent",color:"var(--tx)",fontSize:12,cursor:"pointer",textAlign:"center"}}>导入数据<input type="file" accept=".json" style={{display:"none"}} onChange={e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{let d=JSON.parse(ev.target.result);d=migrate(d);if(d.clients&&confirm(`导入 ${d.clients.length} 客户？`)){sv(d);setMod(null);}}catch{alert("解析失败");}};r.readAsText(f);e.target.value="";}}/></label>
  </div>
  <p className="t2" style={{lineHeight:1.6}}>年份: {avYrs.join(" · ")} · V10 认知外骨骼</p>
</div></Dlg>

</div>);
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
