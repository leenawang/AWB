<title>AWB Fiduciaire · V12 — 认知外骨骼</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'DM Sans','Noto Sans SC',sans-serif;min-height:100dvh;overscroll-behavior:none;letter-spacing:.01em;font-size:14px;background:var(--bg0);color:var(--tx)}
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:10px}
a{color:inherit;text-decoration:none}
:root{
  --bg0:#0c0c0e;--bg1:#141416;--bg2:#1a1a1d;--bg3:#222226;
  --bd:#2a2a2e;--bd2:#1e1e22;
  --tx:#f2f0ec;--tx2:#a0a0a8;--tx3:#6a6a70;
  --ac:#c8a86e;--acA:rgba(200,168,110,.1);--acB:rgba(200,168,110,.25);
  --ok:#a8e6b8;--okA:rgba(168,230,184,.15);
  --wn:#d4a862;--wnA:rgba(212,168,98,.12);
  --er:#c08080;--erA:rgba(192,128,128,.1);
  --gy:#3a3a40;--r:6px;
  --ring:#999;--ringW:2;--ringR:18;--ringSz:44;
  --fs-xs:11px;--fs-sm:12px;--fs-md:13px;--fs-base:14px;--fs-lg:15px;--fs-xl:17px;--fs-2xl:24px;--fs-3xl:32px;
  --card-p:14px;--card-r:8px;--card-gap:10px;
  --green:#4ade80;--greenA:rgba(74,222,128,.12);
  --yellow:#fbbf24;--yellowA:rgba(251,191,36,.12);
  --red:#f87171;--redA:rgba(248,113,113,.12);
  --black:#6b7280;--blackA:rgba(107,114,128,.12)
}
.lt{
  --bg0:#f5f4f0;--bg1:#fff;--bg2:#faf9f6;--bg3:#eeeee8;
  --bd:#d8d7d0;--bd2:#e8e7e0;
  --tx:#1a1a18;--tx2:#6a6a68;--tx3:#9a9a98;
  --acA:rgba(200,168,110,.08);--acB:rgba(200,168,110,.2);
  --okA:rgba(168,230,184,.15);--wnA:rgba(212,168,98,.08);--erA:rgba(192,128,128,.08);
  --ring:#999;--gy:#ccc
}
.heading{font-family:'Cormorant Garamond','Noto Sans SC',serif;font-weight:600;letter-spacing:.02em}
.nb{padding:8px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--tx3);transition:color .2s;white-space:nowrap;letter-spacing:.03em}
.nb.on{color:var(--ac);background:var(--acA)}
.nb:hover:not(.on){color:var(--tx2)}
.sb{border-radius:4px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid;transition:.15s;-webkit-tap-highlight-color:transparent}
.sb:active{transform:scale(1.1)}
.ss{width:28px;height:28px;font-size:11px}
.sm{width:34px;height:34px;font-size:13px}
.sO{background:var(--okA);color:var(--ok);border-color:rgba(168,230,184,.4)}
.sN{background:var(--wnA);color:var(--wn);border-color:rgba(212,168,98,.3)}
.sI{background:var(--acA);color:var(--ac);border-color:var(--acB)}
.sP{background:#2a2a30;color:#bbb;border-color:#666}
.sE{background:#1e1e24;color:#bbb;border-color:#555}
.cd{background:var(--bg1);border:1px solid var(--bd2);border-radius:var(--r);padding:16px}
.ki{border-radius:var(--r);background:var(--bg1);border:1px solid var(--bd2);padding:16px}
.ol{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(20px);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.bx{background:var(--bg1);border:1px solid var(--bd);border-radius:10px 10px 0 0;width:100%;max-width:520px;max-height:88dvh;overflow-y:auto;animation:sheetUp .3s cubic-bezier(.16,1,.3,1)}
@keyframes sheetUp{from{transform:translateY(40%);opacity:0}to{transform:none;opacity:1}}
.bh{display:flex;align-items:center;padding:18px 20px;border-bottom:1px solid var(--bd2);position:sticky;top:0;background:var(--bg1);z-index:10}
.ip{width:100%;padding:10px 12px;border:1px solid var(--bd);border-radius:var(--r);font-size:15px;font-family:inherit;outline:none;background:var(--bg0);color:var(--tx);-webkit-appearance:none;transition:border-color .2s}
.ip:focus{border-color:var(--ac)}
.bb{padding:12px;border-radius:var(--r);background:var(--ac);color:var(--bg0);font-size:14px;font-weight:600;border:none;cursor:pointer;width:100%;-webkit-tap-highlight-color:transparent;transition:.15s;letter-spacing:.04em;text-transform:uppercase}
.bb:active{transform:scale(.97);opacity:.9}
.t2{font-size:12px;color:var(--tx2);letter-spacing:.02em}
.tg{padding:6px 12px;border-radius:var(--r);font-size:11px;cursor:pointer;border:1px solid var(--bd);display:inline-block;font-weight:500;-webkit-tap-highlight-color:transparent;transition:.15s;letter-spacing:.04em;text-transform:uppercase;background:transparent;color:var(--tx2)}
.tg:active{transform:scale(.95)}
.tg.warn{background:var(--wnA);color:var(--wn);border-color:rgba(212,168,98,.3)}
.tg.ac{background:var(--acA);color:var(--ac);border-color:var(--acB)}
table{border-collapse:collapse;width:100%}
th,td{padding:6px 7px;border-bottom:1px solid var(--bd2);font-size:12px}
th{font-weight:500;position:sticky;top:0;z-index:5;color:var(--tx3);background:var(--bg0);text-transform:uppercase;letter-spacing:.06em;font-size:10px}
.ct{height:36px;min-width:36px;border-radius:var(--r);background:#2a2a30;border:1px solid #777;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:18px;color:#fff;-webkit-tap-highlight-color:transparent;transition:.15s}
.ct:active{background:var(--acA);border-color:var(--ac)}
.pr{transform:rotate(-90deg)}
.vt{writing-mode:vertical-rl;display:inline-block;height:56px;line-height:1;font-size:10px;font-weight:400;color:var(--tx3);white-space:nowrap;padding:3px 0;letter-spacing:.02em}
select{background:var(--bg0);color:var(--tx);border:1px solid var(--bd);border-radius:var(--r);font-family:inherit;font-size:14px;padding:8px;-webkit-appearance:none}
textarea{resize:vertical}
.lk{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:var(--r);font-size:11px;color:var(--ac);cursor:pointer;border:1px solid var(--bd);text-decoration:none}
.divider{height:1px;background:var(--bd2);margin:6px 0}
/* V10 新增：状态灯样式 */
.tl{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.04em}
.tl-g{background:var(--greenA);color:var(--green);border:1px solid rgba(74,222,128,.3)}
.tl-y{background:var(--yellowA);color:var(--yellow);border:1px solid rgba(251,191,36,.3)}
.tl-r{background:var(--redA);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.tl-b{background:var(--blackA);color:var(--black);border:1px solid rgba(107,114,128,.3)}
/* V10 指挥中心面板 */
.cmd-panel{background:var(--bg1);border:1px solid var(--bd2);border-radius:8px;padding:16px;display:flex;flex-direction:column;gap:8px}
.cmd-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:8px;border-bottom:1px solid var(--bd2)}
.cmd-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.1em}
.cmd-count{font-size:24px;font-weight:800;line-height:1}
.cmd-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd2);font-size:13px}
.cmd-item:last-child{border-bottom:none}
/* 流水线进度条 */
.pipeline{display:flex;gap:2px;height:6px;border-radius:3px;overflow:hidden;background:var(--bg3)}
.pipeline-seg{height:100%;border-radius:3px;transition:width .4s ease}
.top-nav{display:flex}
.bot-nav{display:none}
@media(max-width:768px){
  .top-nav{display:none}
  .bot-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg1);border-top:1px solid var(--bd2);z-index:40;justify-content:space-around;padding:4px 0 env(safe-area-inset-bottom)}
  .bnb{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;border:none;background:none;color:var(--tx3);cursor:pointer;font-size:10px;font-family:inherit;min-width:52px;letter-spacing:.02em;-webkit-tap-highlight-color:transparent}
  .bnb.on{color:var(--ac)}
  .bnb .bi{font-size:18px;line-height:1}
  .main-wrap{padding-bottom:72px!important}
}
@media(min-width:769px){
  .ol{align-items:center;padding:20px}
  .bx{border-radius:var(--r);max-width:520px}
}
</style>
</head>

<script type="text/babel">

// 红绿灯计算：基于截止日距离
function trafficLight(deadlineMonth, currentMonth, status) {
  if(!deadlineMonth) return 'none';
  if(status==='DONE'||status==='DELIVERED'||status==='SKIP'||status==='O') return 'green';
  const gap = deadlineMonth - currentMonth;
  if(gap < 0) return 'black'; // 严重逾期
  if(gap === 0) return 'red'; // 本月到期
  if(gap === 1) return 'yellow'; // 下月到期
  return 'green'; // 充足时间
}

    if(c.canton===undefined)c.canton="GE"; // V10: 默认日内瓦
  });

    const calItems=init().personal;
    const existIds=new Set(d.personal.map(p=>p.id));
    calItems.forEach(it=>{if(!existIds.has(it.id))d.personal.push(it);});
    d._calImported2=true;
  }

    try{
      const v9=localStorage.getItem("awb-v9");
      if(v9){const v9d=JSON.parse(v9);

function mkICS(events){

  let ics="BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//AWB Fiduciaire//V12//CN\nCALSCALE:GREGORIAN\nMETHOD:PUBLISH\n";
  events.forEach(ev=>{
    const dt=new Date(ev.date+"T09:00:00");const dtE=new Date(ev.date+"T10:00:00");
    ics+=`BEGIN:VEVENT\nDTSTART:${pad(dt)}\nDTEND:${pad(dtE)}\nSUMMARY:${ev.title}\n`;
    if(ev.desc)ics+=`DESCRIPTION:${ev.desc.replace(/\n/g,"\\n")}\n`;
    ics+="BEGIN:VALARM\nTRIGGER:-P1D\nACTION:DISPLAY\nDESCRIPTION:Reminder\nEND:VALARM\n";
    ics+="END:VEVENT\n";
  });
  return ics+"END:VCALENDAR";

function parseICS(text){const events=[];let cur=null;text.split(/\r?\n/).forEach(line=>{if(line==="BEGIN:VEVENT")cur={};else if(line==="END:VEVENT"&&cur){events.push(cur);cur=null;}else if(cur){const m=line.match(/^(SUMMARY|DTSTART|DTSTART;[^:]*|DESCRIPTION|LOCATION):(.+)/);if(m){const k=m[1].startsWith("DTSTART")?"DTSTART":m[1];let v=m[2].replace(/\\n/g,"\n").replace(/\\,/g,",");if(k==="DTSTART")v=v.replace(/^(\d{4})(\d{2})(\d{2}).*$/,"$1-$2-$3");cur[k]=v;}}});return events;}

    <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--tx2)",marginTop:4}}><span>TVA 8.1%</span><span>{tva.toLocaleString()} CHF</span></div>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:15,fontWeight:700,marginTop:8,paddingTop:8,borderTop:"1px solid var(--bd)"}}><span>总计</span><span style={{color:"var(--ac)"}}>{(amt+tva).toLocaleString()} CHF</span></div>
    <div className="t2" style={{marginTop:6}}>发票号: {nextInvNum().num} · 到期: {calcDue(TD,30)}</div>
  </div>;})()}
  <button onClick={()=>{if(!frm.cid)return;const c=D.clients.find(x=>x.id===Number(frm.cid));if(c){genMonthlyInvoice(c.id,frm.period||TD.slice(0,7));setMod(null);}}} className="bb">生成发票</button>
</div></Dlg>

<Dlg open={mod==="addPay"} close={()=>setMod(null)} title="记录收款"><div style={{display:"flex",flexDirection:"column",gap:12}}>
  {frm.invId&&(()=>{const inv=D.invoices.find(i=>i.id===frm.invId);if(!inv)return null;const c=D.clients.find(x=>x.id===inv.cid);return<div style={{padding:10,borderRadius:6,background:"var(--bg0)",fontSize:12}}>
    <div style={{fontWeight:600}}>{inv.num} · {c?.ct}</div>
    <div className="t2" style={{marginTop:4}}>应付: {inv.total.toLocaleString()} CHF · 已付: {invPaid(inv).toLocaleString()} · 余额: {invBalance(inv).toLocaleString()}</div>
  </div>;})()}
  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
    <div><label className="t2" style={{marginBottom:4,display:"block"}}>金额 (CHF)</label><input type="number" value={frm.pamt||""} onChange={e=>setFrm({...frm,pamt:e.target.value})} className="ip" step="0.01"/></div>
    <div><label className="t2" style={{marginBottom:4,display:"block"}}>日期</label><input type="date" value={frm.pdate||TD} onChange={e=>setFrm({...frm,pdate:e.target.value})} className="ip"/></div>
  </div>
  <div><label className="t2" style={{marginBottom:4,display:"block"}}>备注</label><input value={frm.pnote||""} onChange={e=>setFrm({...frm,pnote:e.target.value})} className="ip" placeholder="转账参考号等"/></div>
  <button onClick={()=>{if(frm.invId&&frm.pamt){addPayment(frm.invId,frm.pamt,frm.pdate,frm.pnote);setMod(null);}}} className="bb" style={{background:"var(--green)"}}>确认收款</button>
</div></Dlg>

{/* 设置 */}
<Dlg open={mod==="cfg"} close={()=>setMod(null)} title="设置"><div style={{display:"flex",flexDirection:"column",gap:16}}>
  <div><div style={{fontSize:11,textTransform:"uppercase",letterSpacing:".1em",color:"var(--tx3)",marginBottom:8,fontWeight:600}}>主题</div>
    <div style={{display:"flex",gap:8}}>{[["dark","深色","#0c0c0e","#f2f0ec"],["light","浅色","#f5f4f0","#1a1a18"]].map(([t,l,bg,fg])=><button key={t} onClick={()=>setCfg("theme",t)} style={{flex:1,padding:14,borderRadius:6,border:`1px solid ${D.cfg?.theme===t?"var(--ac)":"var(--bd)"}`,background:bg,color:fg,cursor:"pointer",fontWeight:500,fontSize:14}}>{l}</button>)}</div>
  </div>
  <div><div style={{fontSize:11,textTransform:"uppercase",letterSpacing:".1em",color:"var(--tx3)",marginBottom:8,fontWeight:600}}>色调</div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{Object.entries(PAL).map(([n,c])=><button key={n} onClick={()=>setCfg("accent",n)} style={{width:40,height:40,borderRadius:6,background:c,border:`2px solid ${D.cfg?.accent===n?"#fff":"transparent"}`,cursor:"pointer",fontSize:0,opacity:D.cfg?.accent===n?1:.5,transition:".2s"}} title={n}/>)}</div>
  </div>
  <div style={{borderTop:"1px solid var(--bd2)",paddingTop:12}}>
    <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:".1em",color:"var(--tx3)",marginBottom:8,fontWeight:600}}>云同步（双向）</div>
    <input value={D.cfg?.syncUrl||""} onChange={e=>setCfg("syncUrl",e.target.value)} placeholder="Apps Script URL..." className="ip" style={{marginBottom:10}}/>
    <div style={{display:"flex",gap:8,marginBottom:8}}>
      <button disabled={syncing||!D.cfg?.syncUrl} onClick={cloudPush} className="bb" style={{opacity:D.cfg?.syncUrl?1:.4}}>{syncing==="push"?"同步中...":"双向同步"}</button>
      <button disabled={syncing||!D.cfg?.syncUrl} onClick={cloudPull} style={{flex:1,padding:12,borderRadius:6,border:"1px solid var(--bd)",background:"transparent",color:"var(--tx)",fontSize:13,cursor:D.cfg?.syncUrl?"pointer":"not-allowed",opacity:D.cfg?.syncUrl?1:.4}}>{syncing==="pull"?"下载中...":"拉取"}</button>
    </div>
    {syncMsg&&<p style={{fontSize:12,color:"var(--tx2)"}}>{syncMsg}</p>}
    {D.cfg?.lastPush&&<p className="t2" style={{marginTop:4}}>上次: {new Date(D.cfg.lastPush).toLocaleString("zh-CN")}</p>}
  </div>
  <div style={{borderTop:"1px solid var(--bd2)",paddingTop:12}}>
    <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:".1em",color:"var(--tx3)",marginBottom:8,fontWeight:600}}>日历 & 数据</div>
    <div style={{display:"flex",gap:8,marginBottom:8}}>
      <button onClick={()=>{const evs=[];D.clients.forEach(c=>{TK.forEach(t=>{const s=(D.years[CY]?.st||{})[`${c.id}-${t.id}`]||"";if(t.dl&&t.dl<=12&&s!=="O"&&s!=="P"){const m2=String(t.dl).padStart(2,"0");evs.push({date:`${CY}-${m2}-28`,title:`AWB: ${c.ct} - ${t.s}`,desc:c.n});}});});D.projects.filter(p=>p.dl&&p.status!=="O").forEach(p=>evs.push({date:p.dl,title:p.name,desc:""}));D.personal.filter(p=>p.dl&&p.status!=="O").forEach(p=>evs.push({date:p.dl,title:p.name,desc:p.cat}));if(evs.length)dlICS(evs,`awb-${TD}.ics`);else alert("暂无");}} style={{flex:1,padding:10,borderRadius:6,border:"1px solid var(--bd)",background:"transparent",color:"var(--tx)",fontSize:12,cursor:"pointer"}}>导出日历</button>
      <button onClick={()=>{const blob=new Blob([JSON.stringify(D,null,2)],{type:"application/json"});const u=URL.createObjectURL(blob);const a=document.createElement("a");a.href=u;a.download=`AWB_V10_${TD}.json`;a.click();URL.revokeObjectURL(u);}} style={{flex:1,padding:10,borderRadius:6,border:"1px solid var(--bd)",background:"transparent",color:"var(--tx)",fontSize:12,cursor:"pointer"}}>导出数据</button>
    </div>
    <label style={{display:"block",padding:10,borderRadius:6,border:"1px solid var(--bd)",background:"transparent",color:"var(--tx)",fontSize:12,cursor:"pointer",textAlign:"center"}}>导入数据<input type="file" accept=".json" style={{display:"none"}} onChange={e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{let d=JSON.parse(ev.target.result);d=migrate(d);if(d.clients&&confirm(`导入 ${d.clients.length} 客户？`)){sv(d);setMod(null);}}catch{alert("解析失败");}};r.readAsText(f);e.target.value="";}}/></label>
  </div>
  <p className="t2" style={{lineHeight:1.6}}>年份: {avYrs.join(" · ")} · V12 认知外骨骼</p>
</div></Dlg>

</div>);
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
